<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Battle - Real-time Quiz Game</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <!-- Login/Register Modal -->
    <div id="authModal" class="modal active">
        <div class="modal-content auth-content">
            <h1>Quiz Battle</h1>
            <div class="auth-tabs">
                <button class="tab-btn active" data-tab="login">Login</button>
                <button class="tab-btn" data-tab="register">Register</button>
            </div>

            <!-- Login Form -->
            <div id="loginTab" class="tab-content active">
                <form id="loginForm" class="auth-form">
                    <div class="form-group">
                        <label for="loginUsername">Username</label>
                        <input type="text" id="loginUsername" name="username" required>
                    </div>
                    <div class="form-group">
                        <label for="loginPassword">Password</label>
                        <input type="password" id="loginPassword" name="password" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Login</button>
                </form>
            </div>

            <!-- Register Form -->
            <div id="registerTab" class="tab-content">
                <form id="registerForm" class="auth-form">
                    <div class="form-group">
                        <label for="regUsername">Username</label>
                        <input type="text" id="regUsername" name="username" required>
                    </div>
                    <div class="form-group">
                        <label for="regPassword">Password</label>
                        <input type="password" id="regPassword" name="password" required>
                    </div>
                    <div class="form-group">
                        <label for="regEmail">Email</label>
                        <input type="email" id="regEmail" name="email" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Register</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Main App Container -->
    <div id="appContainer" class="container hidden">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1 class="logo">⚔️ Quiz Battle</h1>
                <div class="user-info">
                    <span id="currentUser">User</span>
                    <button id="logoutBtn" class="btn btn-secondary">Logout</button>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Quiz Selection Screen -->
            <section id="quizSelectionScreen" class="screen active">
                <div class="screen-header">
                    <h2>Available Quizzes</h2>
                    <button id="refreshQuizzesBtn" class="btn btn-secondary">Refresh</button>
                </div>
                <div id="quizList" class="quiz-grid">
                    <!-- Quizzes will be loaded here -->
                </div>
            </section>

            <!-- Game Lobby Screen -->
            <section id="gameLobbyScreen" class="screen">
                <div class="lobby-container">
                    <div class="lobby-header">
                        <h2 id="lobbyQuizTitle">Quiz Title</h2>
                        <button id="backToQuizzesBtn" class="btn btn-secondary">Back</button>
                    </div>
                    <div class="lobby-content">
                        <div class="lobby-info">
                            <p id="lobbyDescription">Description</p>
                            <div class="lobby-stats">
                                <div class="stat">
                                    <span class="stat-label">Questions:</span>
                                    <span id="questionCount" class="stat-value">0</span>
                                </div>
                                <div class="stat">
                                    <span class="stat-label">Difficulty:</span>
                                    <span id="difficultyLevel" class="stat-value">Medium</span>
                                </div>
                            </div>
                        </div>
                        <div class="lobby-actions">
                            <button id="startGameBtn" class="btn btn-primary btn-large">Start Game</button>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Game Play Screen -->
            <section id="gamePlayScreen" class="screen">
                <div class="game-container">
                    <!-- Game Header -->
                    <div class="game-header">
                        <div class="game-title" id="gameQuizTitle">Quiz Title</div>
                        <div class="game-timer">
                            <span id="timer">30</span>s
                        </div>
                        <div class="game-progress">
                            <span id="questionNumber">1</span> / <span id="totalQuestions">10</span>
                        </div>
                    </div>

                    <!-- Question Section -->
                    <div class="question-section">
                        <h3 id="questionText">Question text will appear here</h3>
                        <div id="optionsContainer" class="options-container">
                            <!-- Options will be loaded here -->
                        </div>
                    </div>

                    <!-- Game Score Panel -->
                    <div class="score-panel">
                        <div class="score-item">
                            <span class="score-label">Your Score:</span>
                            <span id="myScore" class="score-value">0</span>
                        </div>
                        <div id="scoreUpdates" class="score-updates">
                            <!-- Live score updates will appear here -->
                        </div>
                    </div>
                </div>
            </section>

            <!-- Game Results Screen -->
            <section id="gameResultsScreen" class="screen">
                <div class="results-container">
                    <h2>Game Over!</h2>
                    <div class="results-content">
                        <div class="results-stats">
                            <div class="result-item">
                                <span class="result-label">Your Score:</span>
                                <span id="finalScore" class="result-value">0</span>
                            </div>
                            <div class="result-item">
                                <span class="result-label">Correct Answers:</span>
                                <span id="correctCount" class="result-value">0</span>
                            </div>
                            <div class="result-item">
                                <span class="result-label">Accuracy:</span>
                                <span id="accuracy" class="result-value">0%</span>
                            </div>
                        </div>
                        <div id="leaderboard" class="leaderboard">
                            <!-- Leaderboard will be shown here -->
                        </div>
                        <div class="results-actions">
                            <button id="playAgainBtn" class="btn btn-primary">Play Again</button>
                            <button id="backToQuizzesFromResultsBtn" class="btn btn-secondary">Back to Quizzes</button>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Toast Notifications -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- WebSocket Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>

    <!-- App Script -->
    <script src="/js/app.js"></script>
</body>
</html>
